server:
  port: 8080

spring:
  application:
    name: reperibilita-web

  datasource:
    url: jdbc:h2:file:./data/reperibilita;AUTO_SERVER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false

# Percorso del vecchio file Access da importare una tantum (facoltativo).
# Avviare con: mvn spring-boot:run -Dspring-boot.run.arguments=--import.mdb.path=/percorso/turni.mdb
import:
  mdb:
    path: ""

# Testi dell'intestazione/firma del modulo di stampa per il centralino (vedi /stampa).
# Modificabili qui senza toccare il codice.
report:
  logo: /images/logo.png
  organizzazione: USL Umbria2
  servizio: Servizio Informatico e Tlc Area Nord
  firma-riga1: Firma del Dirigente

logging:
  level:
    it.reperibilita: INFO
