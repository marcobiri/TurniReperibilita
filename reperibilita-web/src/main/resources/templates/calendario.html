<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' - Reperibilita'">Reperibilita</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
</head>
<body>
<div th:replace="~{fragments/nav :: nav(${activePage})}"></div>

<main>
    <h1>Calendario turni</h1>
    <div id="errore" class="messaggio-errore"></div>

    <div class="card">
        <div class="toolbar">
            <div>
                <label for="filtroServizio">Servizio</label>
                <select id="filtroServizio">
                    <option value="">Tutti</option>
                    <option value="REPERIBILITA">Reperibile Informatica</option>
                    <option value="FONIA">Reperibile fonia</option>
                </select>
            </div>
            <div>
                <label for="filtroOperatore">Operatore</label>
                <select id="filtroOperatore">
                    <option value="">Tutti</option>
                </select>
            </div>
            <div class="spacer"></div>
            <div>
                <label>&nbsp;</label>
                <button class="btn secondario" id="btnGeneraAnno">Genera turni anno</button>
            </div>
            <div>
                <label>&nbsp;</label>
                <button class="btn secondario" id="btnEsportaCsv">Esporta CSV</button>
            </div>
            <div>
                <label>&nbsp;</label>
                <button class="btn secondario" id="btnEsportaIcs">Esporta calendario (.ics)</button>
            </div>
            <div>
                <label>&nbsp;</label>
                <button class="btn" id="btnStampaPdf">Stampa / PDF per centralino</button>
            </div>
        </div>

        <div id="calendar"></div>

        <div class="legenda">
            <span class="legenda-voce"><span class="legenda-pallino" style="background:#2563eb"></span> Reperibile Informatica</span>
            <span class="legenda-voce"><span class="legenda-pallino" style="background:#7c3aed"></span> Reperibile fonia</span>
            <span class="testo-tenue">Clicca su un giorno per assegnare un turno, clicca su un turno per modificarlo o rimuoverlo.</span>
        </div>
    </div>
</main>

<div class="modal-overlay" id="modaleTurno">
    <div class="modal">
        <h2 id="modaleTurnoTitolo">Assegna turno</h2>
        <form id="formTurno">
            <input type="hidden" id="turnoId">
            <div class="modal-campo">
                <label for="turnoData">Data</label>
                <input type="date" id="turnoData" required>
            </div>
            <div class="modal-campo">
                <label for="turnoServizio">Servizio</label>
                <select id="turnoServizio" required>
                    <option value="REPERIBILITA">Reperibile Informatica</option>
                    <option value="FONIA">Reperibile fonia</option>
                </select>
            </div>
            <div class="modal-campo">
                <label for="turnoTipo">Tipo turno</label>
                <select id="turnoTipo" required></select>
            </div>
            <div class="modal-campo">
                <label for="turnoOperatore">Operatore</label>
                <select id="turnoOperatore" required></select>
            </div>
            <div class="modal-azioni">
                <button type="button" class="btn pericolo" id="btnEliminaTurno" style="display:none">Elimina</button>
                <div class="spacer"></div>
                <button type="button" class="btn secondario" id="btnAnnullaTurno">Annulla</button>
                <button type="submit" class="btn">Salva</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay" id="modaleGeneraAnno">
    <div class="modal largo">
        <h2>Genera turni anno</h2>
        <div class="modal-campo">
            <label for="generaAnno">Anno</label>
            <input type="number" id="generaAnno" min="2000" max="2100">
        </div>
        <div class="modal-campo">
            <label for="generaServizio">Servizio</label>
            <select id="generaServizio">
                <option value="">Tutti</option>
                <option value="REPERIBILITA">Reperibile Informatica</option>
                <option value="FONIA">Reperibile fonia</option>
            </select>
        </div>

        <div id="generaAnnoRisultato" class="genera-anno-risultato" style="display:none">
            <p id="generaAnnoRiepilogo" class="testo-tenue"></p>
            <div class="genera-anno-tabella-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Servizio</th>
                            <th>Turno</th>
                            <th>Operatore</th>
                            <th>Stato</th>
                        </tr>
                    </thead>
                    <tbody id="generaAnnoTbody"></tbody>
                </table>
            </div>
        </div>

        <div class="modal-azioni">
            <button type="button" class="btn secondario" id="btnAnnullaGeneraAnno">Annulla</button>
            <div class="spacer"></div>
            <button type="button" class="btn secondario" id="btnAnteprimaGeneraAnno">Genera anteprima</button>
            <button type="button" class="btn" id="btnConfermaGeneraAnno" disabled>Conferma e salva</button>
        </div>
    </div>
</div>

<script src="/js/common.js"></script>
<script src="/js/calendario.js"></script>
</body>
</html>
